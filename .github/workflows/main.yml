name: V.O.I.D Parser Auto-Update

on:
  schedule:
    - cron: '*/55 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Устанавливаем всё, что нужно твоему парсеру (926 строк - это серьезно)
          pip install requests aiohttp aiofiles lxml beautifulsoup4

      - name: Install Xray Core
        run: |
          # Качаем напрямую стабильную версию 1.8.4 (или любую свежую)
          curl -L "https://github.com/XTLS/Xray-core/releases/download/v1.8.4/Xray-linux-64.zip" -o xray.zip
          unzip -o xray.zip
          chmod +x xray
          # Проверяем, что файл реально есть
          ls -l xray
          # Копируем в систему и в папку со скриптом
          sudo cp xray /usr/local/bin/
          cp xray ./xray
          echo "✅ Xray установлен и готов к бою"

      - name: Run V.O.I.D Parser
        run: |
          # Создаем файлы, если их вдруг нет в репо, чтобы не было Code 3
          touch sources.txt
          mkdir -p configs
          # ЗАПУСК (убедись, что файл в репо называется parser.py)
          python parser.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "🌑 VOID: Эфир обновлен $(date +'%Y-%m-%d %H:%M')" || echo "No changes"
          git push
