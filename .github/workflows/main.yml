name: V.O.I.D Parser Auto-Update

on:
  schedule:
    # Запуск каждые 55 минут
    - cron: '*/55 * * * *'
  workflow_dispatch: # Позволяет запускать вручную для теста

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests aiohttp aiofiles

      - name: Install Xray Core
        run: |
          # Скачиваем последнюю версию Xray для проверки конфигов
          LATEST_URL=$(curl -s https://api.github.com/repos/XTLS/Xray-core/releases/latest | grep "browser_download_url.*Xray-linux-64.zip" | cut -d '"' -f 4)
          curl -L "$LATEST_URL" -o xray.zip
          unzip xray.zip
          chmod +x xray
          # Переносим в PATH, чтобы скрипт видел команду 'xray'
          sudo mv xray /usr/local/bin/

      - name: Run V.O.I.D Parser
        run: |
          # Создаем папки, если их нет, чтобы скрипт не вылетал
          mkdir -p configs
          python parser.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          # Коммитим только если файлы реально изменились
          git commit -m "🌑 VOID: Эфир обновлен $(date +'%Y-%m-%d %H:%M')" || echo "Изменений не обнаружено"
          git push
